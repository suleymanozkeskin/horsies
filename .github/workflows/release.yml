name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the built distributions to PyPI
        required: true
        default: true
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          print(f"version={pyproject['project']['version']}")
          PY

      - name: Show release metadata
        run: echo "Preparing release for horsies ${{ steps.version.outputs.version }}"

  unit:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

  integration:
    needs: metadata
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: horsies
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run integration tests
        env:
          DB_PASSWORD: testpassword
        run: uv run pytest tests/integration/ -v --tb=short

  e2e:
    needs: metadata
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: horsies
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: E2E - Layer 1 (tasks)
        env:
          DB_PASSWORD: testpassword
        run: |
          uv run pytest tests/e2e/test_layer1_tasks.py -v --tb=short
          pkill -TERM -f "horsies worker" 2>/dev/null || true
          sleep 5

      - name: E2E - Layer 2 (cluster)
        env:
          DB_PASSWORD: testpassword
        run: |
          uv run pytest tests/e2e/test_layer2_cluster.py -v --tb=short
          pkill -TERM -f "horsies worker" 2>/dev/null || true
          sleep 5

      - name: E2E - Layer 3 (scheduler)
        env:
          DB_PASSWORD: testpassword
        run: |
          uv run pytest tests/e2e/test_layer3_scheduler.py -v --tb=short
          pkill -TERM -f "horsies worker" 2>/dev/null || true
          sleep 5

      - name: E2E - Layer 4 (workflow structure)
        env:
          DB_PASSWORD: testpassword
        run: |
          uv run pytest tests/e2e/test_layer4_workflow_structure.py -v --tb=short
          pkill -TERM -f "horsies worker" 2>/dev/null || true
          sleep 5

      - name: E2E - Layer 5 (workflow dataflow)
        env:
          DB_PASSWORD: testpassword
        run: |
          uv run pytest tests/e2e/test_layer5_workflow_dataflow.py -v --tb=short
          pkill -TERM -f "horsies worker" 2>/dev/null || true
          sleep 5

      - name: E2E - Layer 6 (workflow advanced)
        env:
          DB_PASSWORD: testpassword
        run: |
          uv run pytest tests/e2e/test_layer6_workflow_advanced.py -v --tb=short
          pkill -TERM -f "horsies worker" 2>/dev/null || true
          sleep 5

      - name: E2E - Fanout saturation
        env:
          DB_PASSWORD: testpassword
        run: uv run pytest tests/e2e/test_fanout_saturation.py -v --tb=short

  build:
    needs: [metadata, unit, integration, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Clean dist directory
        run: rm -rf dist

      - name: Build distributions
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: horsies-dist-${{ needs.metadata.outputs.version }}
          path: dist/*
          if-no-files-found: error

  publish:
    if: ${{ inputs.publish }}
    needs: [metadata, build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: horsies-dist-${{ needs.metadata.outputs.version }}
          path: dist

      - name: Verify PyPI token is configured
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [[ -z "${PYPI_TOKEN}" ]]; then
            echo "Missing PYPI_TOKEN GitHub Actions secret" >&2
            exit 1
          fi

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish
